server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md

milvus:
  host: localhost
  port: 19530
  username: ""
  password: ""
  database: default
  timeout: 10000
  recreate-on-start: false

# 阿里云 DashScope Embedding API 配置（RAG 向量生成）
dashscope:
  api:
    key: ${DASHSCOPE_API_KEY:YOUR_API_KEY}
  embedding:
    model: text-embedding-v4

# Spring AI Alibaba + Spring Boot 基础配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/interview_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:YOUR_API_KEY}
      chat:
        options:
          timeout: 180000
      retry:
        max-attempts: 3
        backoff:
          initial-interval: 2000
          multiplier: 2
          max-interval: 10000

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# SiliconFlow 音频转写 API 配置
siliconflow:
  api-key: ${SILICONFLOW_API_KEY:YOUR_API_KEY}
  audio:
    model: TeleAI/TeleSpeechASR
    max-file-size-mb: 500

# 文档分片配置
document:
  chunk:
    max-size: 800
    overlap: 100

# RAG 配置
rag:
  top-k: 3
  model: "qwen-plus"
  hybrid:
    dense-top-k: 20
    sparse-top-k: 20
  rerank:
    rrf-threshold: 0.02
    top-k: 5

# Prometheus 配置
prometheus:
  base-url: http://localhost:9090
  timeout: 10
  mock-enabled: false

# CLS 云日志服务配置
cls:
  mock-enabled: false

# RocketMQ 配置
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: audio-producer-group
    send-message-timeout: 30000

# 音频上传配置
audio:
  upload:
    base-path: ./uploads/audio
    allowed-extensions: m4a,mp3,wav,flac
    max-file-size: 524288000
    chunk-ttl-seconds: 86400
